type: custom:button-card
show_state: true
tap_action: none
custom_fields:
  sigenstor:
    card:
      type: picture
      image: local/sigenergy_sigenstor.svg
      tap_action:
        action: navigate
        navigation_path: /energy
      card_mod:
        style: |
          ha-card {
            border: none;
          }
  gateway:
    card:
      type: picture
      image: local/sigenergy_gateway.svg
      tap_action:
        action: navigate
        navigation_path: /config/integrations/integration/sigen
      card_mod:
        style: |
          ha-card {
            border: none;
          }
  pv_power:
    card:
      type: custom:button-card
      entity: sensor.sigen_plant_pv_power
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 1.2em
            - font-weight: bold
            - letter-spacing: "-0.1px"
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 0.8em
            - color: orange
      custom_fields:
        value: |
          [[[
            const v = parseFloat(states['sensor.sigen_plant_pv_power']?.state || 0);
            return v < 1
              ? `${Math.round(v * 1000)} W`
              : `${v.toFixed(2)} kW`;
          ]]]
        label: SOLAR
      tap_action:
        action: more-info
        entity: sensor.sigen_plant_pv_power
  pv_energy:
    card:
      type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 0.8em
            - color: var(--secondary-text-color)
          label:
            - justify-self: start
            - font-size: 0.8em
            - color: var(--secondary-text-color)
      custom_fields:
        value: |
          [[[
            const e = parseFloat(states['sensor.sigen_plant_daily_pv_energy']?.state || 0);
            return `${e.toFixed(1)} kWh today`;
          ]]]
        label: |
          [[[
            const f = parseFloat(states['sensor.solcast_pv_forecast_forecast_today']?.state || 0);
            return `${f.toFixed(2)} kWh forecast`;
          ]]]
  home_power:
    card:
      type: custom:button-card
      entity: sensor.sigen_plant_consumed_power
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 1.2em
            - font-weight: bold
            - letter-spacing: "-0.1px"
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 0.8em
            - color: skyblue
      custom_fields:
        value: |
          [[[
            const v = parseFloat(states['sensor.sigen_plant_consumed_power']?.state || 0);
            return v < 1
              ? `${Math.round(v * 1000)} W`
              : `${v.toFixed(2)} kW`;
          ]]]
        label: HOME
      tap_action:
        action: more-info
        entity: sensor.sigen_plant_consumed_power
  home_energy:
    card:
      type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
          - grid-template-rows: min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 0.8em
            - color: var(--secondary-text-color)
      custom_fields:
        value: |
          [[[
            const e = parseFloat(states['sensor.sigen_plant_daily_load_consumption']?.state || 0);
            return `${e.toFixed(2)} kWh today`;
          ]]]
  grid_power:
    card:
      type: custom:button-card
      entity: sensor.sigen_plant_grid_active_power
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 1em
            - font-weight: bold
            - letter-spacing: "-0.1px"
            - color: |
                [[[
                  return parseInt(states['sensor.sigen_plant_grid_active_power']?.state || 0) >= 13
                    ? '#EE4B2B'
                    : 'white';
                ]]]
          label:
            - justify-self: start
            - font-size: 0.8em
            - color: |
                [[[
                  return states['sensor.sigen_plant_grid_connection_status']?.state === 'On Grid'
                    ? 'skyblue'
                    : '#EE4B2B';
                ]]]
      custom_fields:
        value: |
          [[[
            const v = parseFloat(states['sensor.sigen_plant_grid_active_power']?.state || 0);
            return Math.abs(v) < 1
              ? `${Math.round(v * 1000)} W`
              : `${v.toFixed(2)} kW`;
          ]]]
        label: |
          [[[
            return states['sensor.sigen_plant_grid_connection_status']?.state === 'On Grid'
              ? 'GRID'
              : 'OFF GRID';
          ]]]
      tap_action:
        action: more-info
        entity: sensor.sigen_plant_grid_active_power
  grid_energy:
    card:
      type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: start
            - font-size: 0.8em
            - color: var(--secondary-text-color)
          label:
            - justify-self: start
            - font-size: 0.8em
            - color: var(--secondary-text-color)
      custom_fields:
        value: |
          [[[
            const imp = parseFloat(states['sensor.sigen_plant_daily_grid_import_energy']?.state || 0);
            const exp = parseFloat(states['sensor.sigen_plant_daily_grid_export_energy']?.state || 0);
            return `${imp.toFixed(2)} / -${exp.toFixed(2)} kWh`;
          ]]]
        label: |
          [[[
            const mode = states['select.sigen_plant_remote_ems_control_mode']?.state || '';
            if (mode.includes('Charging')) return 'ESS Charging';
            if (mode.includes('Discharging')) return 'ESS Discharging';
            const soc = parseInt(states['sensor.sigen_plant_battery_state_of_charge']?.state || 0);
            const reserve = parseInt(states['number.sigen_plant_ess_backup_state_of_charge']?.state || 0);
            if (soc <= reserve) return 'Using Grid (at reserve)';
            if (mode.includes('Self')) return 'Self Consumption';
            return 'Unknown mode';
          ]]]
  battery_soc:
    card:
      type: custom:button-card
      entity: sensor.sigen_plant_battery_state_of_charge
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: end
            - font-size: 1em
            - font-weight: bold
            - letter-spacing: "-0.1px"
            - color: |
                [[[
                  return parseInt(states['sensor.sigen_plant_battery_state_of_charge']?.state || 0) <= 10
                    ? '#EE4B2B'
                    : 'white';
                ]]]
          label:
            - justify-self: end
            - font-size: 0.8em
            - color: skyblue
      custom_fields:
        value: |
          [[[
            return `${states['sensor.sigen_plant_battery_state_of_charge']?.state}% (${states['sensor.sigen_plant_battery_usable_capacity']?.state} kWh)`;
          ]]]
        label: BATTERY
      tap_action:
        action: more-info
        entity: sensor.sigen_plant_battery_state_of_charge
  battery_status:
    card:
      type: custom:button-card
      entity: sensor.sigen_plant_battery_power
      show_icon: false
      show_name: false
      show_state: false
      styles:
        card:
          - background: none
          - border: none
        grid:
          - grid-template-areas: |
              "value"
              "label"
          - grid-template-rows: min-content min-content
        custom_fields:
          value:
            - justify-self: end
            - font-size: 0.8em
            - color: var(--primary-text-color)
          label:
            - justify-self: end
            - font-size: 0.8em
            - color: var(--secondary-text-color)
      custom_fields:
        value: |
          [[[
            const p = parseFloat(states['sensor.sigen_plant_battery_power']?.state || 0);
            if (Math.abs(p) < 0.1) return 'Floating';
            if (p > 0) return `Charging ${p.toFixed(1)} kW`;
            if (p < 0) return `Discharging ${Math.abs(p).toFixed(1)} kW`;
          ]]]
        label: |
          [[[
            return states['sensor.sigen_plant_battery_time_remaining']?.state || '';
          ]]]
      tap_action:
        action: more-info
        entity: sensor.sigen_plant_battery_power
  vertical_line_pv:
    card:
      type: custom:button-card
      card_mod:
        style: |
          ha-card {
            border: none;
            position: relative;
            width: 1px;
            height: 70px;
            background-color: var(--secondary-text-color);
          }
  vertical_line_home:
    card:
      type: custom:button-card
      card_mod:
        style: |
          ha-card {
            border: none;
            position: relative;
            width: 1px;
            height: 55px;
            background-color: var(--secondary-text-color);
          }
  vertical_line_sig:
    card:
      type: custom:button-card
      card_mod:
        style: |
          ha-card {
            border: none;
            position: relative;
            width: 1px;
            height: 75px;
            background-color: var(--secondary-text-color);
          }
  vertical_line_grid:
    card:
      type: custom:button-card
      card_mod:
        style: |
          ha-card {
            border: none;
            position: relative;
            width: 1px;
            height: 70px;
            background-color: var(--secondary-text-color);
          }
  animated_line_pv_sig_01:
    card:
      type: custom:button-card
      triggers_update: binary_sensor.sigen_plant_pv_generating
      card_mod:
        style: |
          ha-card {
            position: relative;
            height: 2px !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(0deg);
            transform-origin: left center;
          }
          {% if is_state('binary_sensor.sigen_plant_pv_generating', 'on') %}
            ha-card::before {
              content: "";
              position: relative;
              top: 0;
              left: -60%;
              width: 60%;
              height: 2px;
              background: linear-gradient(to left,
                rgba(0, 123, 255, 0.0) 0%,
                rgba(0, 123, 255, 0.4) 40%,
                rgba(0, 123, 255, 1.0) 100%);
              border-radius: 1px;
              animation: cometMove 2s ease-in-out infinite;
              pointer-events: none;
            }
          {% endif %}
          @keyframes cometMove {
            0% {
              left: 100%;
            }
            100% {
              left: -30%;
            }
          }
  animated_line_pv_sig_02:
    card:
      type: custom:button-card
      triggers_update: binary_sensor.sigen_plant_pv_generating
      card_mod:
        style: |
          ha-card {
            position: relative;
            height: 2px !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(90deg);
            transform-origin: left center;
          }
          {% if is_state('binary_sensor.sigen_plant_pv_generating', 'on') %}
            ha-card::before {
              content: "";
              position: relative;
              top: 0;
              left: -60%;
              width: 60%;
              height: 2px;
              background: linear-gradient(to right,
                rgba(0, 123, 255, 0.0) 0%,
                rgba(0, 123, 255, 0.4) 40%,
                rgba(0, 123, 255, 1.0) 100%);
              border-radius: 1px;
              animation: cometMove 2s ease-in-out infinite 1s;
              pointer-events: none;
            }
            @keyframes cometMove {
              0% {
                left: -50%;
              }
              100% {
                left: 100%;
              }
            }
          {% endif %}
  animated_line_sig_gw:
    card:
      type: custom:button-card
      triggers_update: sensor.sigen_plant_battery_power
      card_mod:
        style: |
          ha-card {
            position: relative;
            height: 2px !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(20deg);
            transform-origin: left center;
          }
          ha-card::before {
            content: "";
            position: relative;
            top: 0;
            left: -60%;
            width: 60%;
            height: 2px;
            {% if is_state('binary_sensor.sigen_plant_battery_discharging', 'on') or is_state('binary_sensor.sigen_plant_pv_generating', 'on') %}
              background: linear-gradient(to right,
            {% else %}
              background: linear-gradient(to left,
            {% endif %}
              rgba(0, 123, 255, 0.0) 0%,
              rgba(0, 123, 255, 0.4) 40%,
              rgba(0, 123, 255, 1.0) 100%);
            border-radius: 1px;
            animation: cometMove 2.5s ease-in-out infinite;
            pointer-events: none;
          }
          @keyframes cometMove {
            0% {
              {% if is_state('binary_sensor.sigen_plant_battery_discharging', 'on') or is_state('binary_sensor.sigen_plant_pv_generating', 'on') %}
                left: -30%;
              {% else %}
                left: 100%;
              {% endif %}
            }
            100% {
              {% if is_state('binary_sensor.sigen_plant_battery_discharging', 'on') or is_state('binary_sensor.sigen_plant_pv_generating', 'on') %}
                left: 100%;
              {% else %}
                left: -30%;
              {% endif %}
            }
          }
  animated_line_gw_home:
    card:
      type: custom:button-card
      triggers_update: sensor.sigen_plant_plant_active_power
      card_mod:
        style: |
          ha-card {
            position: relative;
            height: 2px !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(-25deg);
            transform-origin: left center;
          }
          ha-card::before {
            content: "";
            position: relative;
            top: 0;
            left: -60%;
            width: 60%;
            height: 2px;
            background: linear-gradient(to right,
              rgba(0, 123, 255, 0.0) 0%,
              rgba(0, 123, 255, 0.4) 40%,
              rgba(0, 123, 255, 1.0) 100%);
            border-radius: 1px;
            animation: cometMove 2s ease-in-out infinite 2s;
            pointer-events: none;
          }
          @keyframes cometMove {
            0% {
              left: -30%;
            }
            100% {
              left: 100%;
            }
          }
  animated_line_gw_grid_01:
    card:
      type: custom:button-card
      triggers_update: sensor.sigen_plant_grid_active_power
      card_mod:
        style: >
          ha-card {
            position: relative;
            height: {{ '2px' if is_state('sensor.sigen_plant_grid_connection_status','On Grid') else '0px' }} !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(90deg);
            transform-origin: left center;
          }   
          {% if states('sensor.sigen_plant_grid_active_power')|float(0) != 0 %} 
            ha-card::before {
              content: "";
              position: relative;
              top: 0;
              left: -60%;
              width: 60%;
              height: 2px;
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                background: linear-gradient(to left,
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                background: linear-gradient(to right,
              {% endif %}
              rgba(0, 123, 255, 0.0) 0%,
              rgba(0, 123, 255, 0.4) 40%,
              rgba(100, 123, 255, 1.0) 100%);
              border-radius: 1px;
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                animation: cometMove 2s ease-in-out infinite 1s;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                animation: cometMove 2s ease-in-out infinite;
              {% endif %}
              pointer-events: none;
              }
          {% endif %}  
          @keyframes cometMove {
            0% {
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                left: 100%;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                left: -30%;
              {% endif %}
            }
            100% {
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                left: -30%;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                left: 100%;
              {% endif %}
            }
          }
  animated_line_gw_grid_02:
    card:
      type: custom:button-card
      triggers_update: sensor.sigen_plant_grid_active_power
      card_mod:
        style: >
          ha-card {
            position: relative;
            height: {{ '2px' if is_state('sensor.sigen_plant_grid_connection_status','On Grid') else '0px' }} !important;
            background: lightgray;
            border: none;
            opacity: 0.6;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            box-sizing: content-box;
            transform: rotate(20deg);
            transform-origin: left center;
          }
          {% if states('sensor.sigen_plant_grid_active_power')|float(0) != 0 %}
            ha-card::before {
              content: "";
              position: relative;
              top: 0;
              left: -60%;
              width: 60%;
              height: 2px;
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                background: linear-gradient(to left,
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                background: linear-gradient(to right,
              {% endif %}
              rgba(0, 123, 255, 0.0) 0%,
              rgba(0, 123, 255, 0.4) 40%,
              rgba(100, 123, 255, 1.0) 100%);
              border-radius: 1px;
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                animation: cometMove 2s ease-in-out infinite;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                animation: cometMove 2s ease-in-out infinite 1s;
              {% endif %}
              pointer-events: none;
              }
          {% endif %}
          @keyframes cometMove {
            0% {
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                left: 100%;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                left: -40%;
              {% endif %}
            }
            100% {
              {% if is_state('binary_sensor.sigen_plant_importing_from_grid', 'on') %}
                left: -30%;
              {% elif is_state('binary_sensor.sigen_plant_exporting_to_grid', 'on') %}
                left: 100%;
              {% endif %}
            }
          }
styles:
  card:
    - height: 360px
  custom_fields:
    sigenstor:
      - position: absolute
      - top: 70px
      - left: 65px
      - width: 90px
    gateway:
      - position: absolute
      - top: 120px
      - left: 180px
      - width: 60px
    pv_power:
      - position: absolute
      - top: 5px
      - left: 165px
    pv_energy:
      - position: absolute
      - top: 45px
      - left: 165px
    home_power:
      - position: absolute
      - top: 130px
      - left: 280px
    home_energy:
      - position: absolute
      - top: 170px
      - left: 280px
    grid_power:
      - position: absolute
      - top: 245px
      - left: 270px
    grid_energy:
      - position: absolute
      - top: 280px
      - left: 270px
    battery_soc:
      - position: absolute
      - top: 270px
      - left: 0px
      - transform: translateX(-35px)
      - width: 200px
    battery_status:
      - position: absolute
      - top: 310px
      - left: 0px
      - transform: translateX(-35px)
      - width: 200px
    vertical_line_pv:
      - position: absolute
      - top: 10px
      - left: 155px
      - width: 1px
    vertical_line_home:
      - position: absolute
      - top: 135px
      - left: 270px
      - width: 1px
    vertical_line_sig:
      - position: absolute
      - top: 278px
      - left: 175px
      - width: 1px
    vertical_line_grid:
      - position: absolute
      - top: 249px
      - left: 260px
      - width: 1px
    animated_line_pv_sig_01:
      - position: absolute
      - top: 35px
      - left: 110px
      - width: 42px
    animated_line_pv_sig_02:
      - position: absolute
      - top: 35px
      - left: 110px
      - width: 50px
    animated_line_sig_gw:
      - position: absolute
      - top: 145px
      - left: 145px
      - width: 39px
    animated_line_gw_home:
      - position: absolute
      - top: 175px
      - left: 238px
      - width: 33px
    animated_line_gw_grid_01:
      - position: absolute
      - top: 213px
      - left: 210px
      - width: 48px
    animated_line_gw_grid_02:
      - position: absolute
      - top: 260px
      - left: 210px
      - width: 50px
